<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contador de Saltos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
      padding-top: 50px;
    }

    #counter {
      font-size: 70px;
      margin: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #start { background: #28a745; color: white; }
    #reset { background: #dc3545; color: white; }
  </style>
</head>

<body>

  <h1>📱 Contador de saltos</h1>

  <div id="counter">0</div>

  <button id="start">Iniciar</button>
  <button id="reset">Reset</button>

  <script>
    let count = 0;

    let lastX = 0, lastY = 0, lastZ = 0;
    let calibrated = false;

    let lastJumpTime = 0;
    const COOLDOWN = 700;

    let buffer = [];
    const BUFFER_SIZE = 5;

    let threshold = 12;

    const counterEl = document.getElementById("counter");

    function updateCounter() {
      if (counterEl) counterEl.textContent = count;
    }

    function getSmoothedDelta(delta) {
      buffer.push(delta);
      if (buffer.length > BUFFER_SIZE) buffer.shift();

      let sum = 0;
      for (let i = 0; i < buffer.length; i++) {
        sum += buffer[i];
      }

      return sum / buffer.length;
    }

    function handleMotion(event) {
      const acc = event.accelerationIncludingGravity;
      if (!acc) return;

      const x = acc.x || 0;
      const y = acc.y || 0;
      const z = acc.z || 0;

      if (!calibrated) {
        lastX = x;
        lastY = y;
        lastZ = z;
        calibrated = true;
        return;
      }

      const delta =
        Math.abs(x - lastX) +
        Math.abs(y - lastY) +
        Math.abs(z - lastZ);

      const smoothDelta = getSmoothedDelta(delta);
      const finalDelta = Math.max(smoothDelta, delta);

      const now = Date.now();

      if (finalDelta > threshold && (now - lastJumpTime > COOLDOWN)) {
        count++;
        lastJumpTime = now;
        updateCounter();
      }

      lastX = x;
      lastY = y;
      lastZ = z;
    }

    document.getElementById("start").addEventListener("click", async () => {
      calibrated = false;
      buffer = [];

      try {
        if (typeof DeviceMotionEvent.requestPermission === "function") {
          const response = await DeviceMotionEvent.requestPermission();
          if (response !== "granted") return;
        }

        window.addEventListener("devicemotion", handleMotion);

      } catch (e) {
        console.log("error sensor");
      }
    });

    document.getElementById("reset").addEventListener("click", () => {
      count = 0;
      updateCounter();
    });

    updateCounter();
  </script>

</body>
</html>
